services:
  mysql_db:
    image: mysql:latest
    container_name: mysql_db
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: turma_desenvolvimento
      MYSQL_USER: user
      MYSQL_PASSWORD: 12345
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin_web:
    image: phpmyadmin:latest
    container_name: phpmyadmin_web
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql_db

volumes:
  db_data: